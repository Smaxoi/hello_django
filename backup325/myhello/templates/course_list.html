<!DOCTYPE html>
<html>
<head>
<style>
table {
    font-family: Arial, Helvetica, sans-serif;
    border-collapse: collapse;
    width: 100%;
}

/* 邊框 + padding */
td, th {
    border: 1px solid #999;
    padding: 10px;
}

/* 表頭 */
th {
    background-color: #04AA6D;
    color: white;
    text-align: left;
}

/* 偶數列灰色 */
tr:nth-child(even) {
    background-color: #f2f2f2;
}

/* 滑鼠移上去 */
tr:hover {
    background-color: #ddd;
}

/* 文字自動換行 */
td {
    word-break: break-word;
}
</style>
</head>

<body>

<h2>資工選課表</h2>

<table>
    <tr>
        <th>開課單位</th>
        <th>開課名稱</th>
        <th>授課教師</th>
    </tr>

    {% for c in courses %}
    <tr>
        <td>{{ c.department }}</td>
        <td>{{ c.course_title }}</td>
        <td>{{ c.instructor }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
